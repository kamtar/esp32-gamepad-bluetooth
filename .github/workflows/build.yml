name: Build ESP32-S3 firmware

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Build (ESP-IDF / esp32s3)
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.2.2
          target: esp32s3
          path: '.'
          command: idf.py set-target esp32s3 build && idf.py size

      - name: Show build binaries
        run: |
          ls -lah build
          find build -maxdepth 3 -type f -name '*.bin' -print

      - name: Upload firmware binaries
        uses: actions/upload-artifact@v4
        with:
          name: esp32s3-firmware-binaries
          path: |
            build/*.bin
            build/bootloader/*.bin
            build/partition_table/*.bin
          if-no-files-found: error
